services:
  postgres:
    image: postgres:17
    container_name: apple-llm-wiki-pg
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: apple_llm_wiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d apple_llm_wiki"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
